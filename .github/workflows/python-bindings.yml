name: Python bindings

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: ["main", "master"]
    tags: ["v*"]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONUTF8: "1"
  CIBW_BUILD_VERBOSITY: "1"

jobs:
  lint-and-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install uv and set the Python version
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync

      - name: Generate bindings
        run: uv run python scripts/build_bindings.py --profile reldev --clean

      - name: Run smoke tests
        run: uv run pytest tests/test_smoke.py

  build-wheels:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
        os: [ubuntu-24.04, ubuntu-22.04-arm, windows-latest, macos-latest]
        include:
          - os: ubuntu-22.04-arm
            python-platform: "manylinux_2_28_aarch64"
          - os: ubuntu-24.04
            python-platform: "manylinux_2_39_x86_64"
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Source
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install uv and set the Python version
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Linux Depends
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt update
          sudo apt install -y patchelf

      - name: Sync dependencies
        run: uv sync

      - name: Build Package
        run: uv build --wheel

      - name: Fix package platform on Linux
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          uv add auditwheel
          uv run auditwheel repair --plat ${{ matrix.python-platform }} dist/*.whl -w fix-dist/
          rm dist/*.whl
          mv fix-dist/*.whl dist/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: python-package-${{ matrix.os }}-${{ matrix.python-version }}
          path: dist/*
          if-no-files-found: 'error'

  python-source:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install uv and set the Python version
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: '3.13'
          save-cache: "false"

      - name: Build Source Distribution
        run: uv build --sdist

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: python-source-package
          path: dist/*
          if-no-files-found: 'error'

  publish-pypi:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-wheels, python-source]
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist/
          merge-multiple: true

      - name: Install uv and set the Python version
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: '3.13'
          save-cache: "false"

      - name: Publish distribution 📦 to PyPI
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          uv publish dist/*.whl dist/*.tar.gz

  publish-github-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-wheels, python-source]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist/
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
